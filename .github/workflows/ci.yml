name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore JFileWPF.sln

      - name: Build
        run: dotnet build JFileWPF.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/JFileWPF.Tests/ -c Release --no-build --logger trx --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx

  publish:
    name: Publish Package
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/JFileWPF/JFileWPF.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:DebugType=none
          -p:DebugSymbols=false
          -o ./publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Item ./publish/JFileWPF.dll).VersionInfo.ProductVersion -replace '\+.*',''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./JFileWPF-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: JFileWPF-${{ steps.version.outputs.version }}-win-x64
          path: ./JFileWPF-${{ steps.version.outputs.version }}-win-x64.zip
          if-no-files-found: error
